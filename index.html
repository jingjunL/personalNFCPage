<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f7f4ee">
    <title>Jingjun Li</title>
    <meta
      name="description"
      content="Contact links for Jingjun Li, including email, LinkedIn, Google Scholar, and university profile."
    >
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f4ee;
        --ink: #171717;
        --muted: #65615a;
        --panel: #fffdf8;
        --line: #ded8ca;
        --accent: #166d6b;
        --accent-ink: #efffff;
        --focus: #b26b00;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(22, 109, 107, 0.12), transparent 34rem),
          linear-gradient(135deg, #f7f4ee 0%, #f3efe7 48%, #eef4f4 100%);
        color: var(--ink);
        display: grid;
        place-items: center;
        padding: 32px 16px;
      }

      main {
        width: min(100%, 430px);
      }

      .card {
        background: color-mix(in srgb, var(--panel) 94%, white);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 22px 60px rgba(51, 45, 33, 0.12);
        padding: 32px 24px 24px;
      }

      .identity {
        display: grid;
        gap: 10px;
        margin-bottom: 26px;
      }

      .eyebrow {
        margin: 0;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.3rem, 14vw, 3.2rem);
        line-height: 0.94;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.55;
      }

      .links {
        display: grid;
        gap: 12px;
      }

      .link {
        min-height: 58px;
        display: grid;
        grid-template-columns: 42px 1fr auto;
        align-items: center;
        gap: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        color: var(--ink);
        padding: 10px 14px 10px 10px;
        text-decoration: none;
        transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
      }

      .link:hover {
        border-color: color-mix(in srgb, var(--accent) 64%, var(--line));
        box-shadow: 0 12px 24px rgba(22, 109, 107, 0.12);
        transform: translateY(-1px);
      }

      .link:focus-visible {
        outline: 3px solid color-mix(in srgb, var(--focus) 42%, transparent);
        outline-offset: 3px;
      }

      .icon {
        width: 42px;
        height: 42px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: #eef4f4;
        color: var(--accent);
        font-weight: 800;
      }

      .text {
        display: grid;
        gap: 2px;
        min-width: 0;
      }

      .label {
        font-weight: 750;
      }

      .hint {
        color: var(--muted);
        font-size: 0.92rem;
        overflow-wrap: anywhere;
      }

      .arrow {
        color: var(--accent);
        font-size: 1.2rem;
        font-weight: 900;
      }

      .primary {
        background: var(--accent);
        color: var(--accent-ink);
        border-color: var(--accent);
      }

      .primary .icon {
        background: rgba(255, 255, 255, 0.16);
        color: var(--accent-ink);
      }

      .primary .hint,
      .primary .arrow {
        color: color-mix(in srgb, var(--accent-ink) 86%, transparent);
      }

      footer {
        margin-top: 18px;
        color: var(--muted);
        font-size: 0.84rem;
        line-height: 1.5;
        text-align: center;
      }

      @media (max-width: 360px) {
        .card {
          padding: 26px 18px 20px;
        }

        .link {
          grid-template-columns: 38px 1fr;
        }

        .icon {
          width: 38px;
          height: 38px;
        }

        .arrow {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main aria-label="Contact card for Jingjun Li">
      <section class="card">
        <div class="identity">
          <p class="eyebrow">Digital contact card</p>
          <h1>Jingjun Li</h1>
          <p class="subtitle">Tap a link below to get in touch or view my academic profile.</p>
        </div>

        <div class="links">
          <a class="link primary" href="mailto:jingjun.li@hw.ac.uk?subject=Hello%20Jingjun%20Li">
            <span class="icon" aria-hidden="true">@</span>
            <span class="text">
              <span class="label">Email</span>
              <span class="hint">jingjun.li@hw.ac.uk</span>
            </span>
            <span class="arrow" aria-hidden="true">></span>
          </a>

          <a class="link" href="https://www.linkedin.com/in/jingjunli/" target="_blank" rel="noopener noreferrer">
            <span class="icon" aria-hidden="true">in</span>
            <span class="text">
              <span class="label">LinkedIn</span>
              <span class="hint">Professional profile</span>
            </span>
            <span class="arrow" aria-hidden="true">></span>
          </a>

          <a class="link" href="https://scholar.google.com/citations?user=O_RLjvQAAAAJ&amp;hl=en&amp;inst=16061989973938494330" target="_blank" rel="noopener noreferrer">
            <span class="icon" aria-hidden="true">G</span>
            <span class="text">
              <span class="label">Google Scholar</span>
              <span class="hint">Publications and citations</span>
            </span>
            <span class="arrow" aria-hidden="true">></span>
          </a>

          <a class="link" href="https://researchportal.hw.ac.uk/en/persons/jingjun-li/" target="_blank" rel="noopener noreferrer">
            <span class="icon" aria-hidden="true">HW</span>
            <span class="text">
              <span class="label">University Profile</span>
              <span class="hint">School personal page</span>
            </span>
            <span class="arrow" aria-hidden="true">></span>
          </a>
        </div>
      </section>

      <footer>
        Jingjun Li | NFC contact page
      </footer>
    </main>
  </body>
</html>
